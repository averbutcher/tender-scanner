<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Electra Target Tools</title>
<style>
:root {
  --sidebar: 270px;
  --primary: #1a3a5c;
  --primary-h: #15304e;
  --accent: #2563eb;
  --bg: #ffffff;
  --bg2: #f8f9fb;
  --border: #e4e7ec;
  --text: #111827;
  --muted: #6b7280;
  --green: #16a34a; --green-bg: #dcfce7;
  --yellow: #b45309; --yellow-bg: #fef9c3;
  --orange: #c2410c; --orange-bg: #ffedd5;
  --red: #b91c1c; --red-bg: #fee2e2;
  --radius: 8px;
  --shadow: 0 1px 3px rgba(0,0,0,.08), 0 1px 2px rgba(0,0,0,.05);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',Arial,sans-serif;background:var(--bg);color:var(--text);direction:rtl}
.hidden{display:none!important}

/* ── Login ─────────────────────────────────────────── */
#login-page{min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--bg2)}
.login-card{background:var(--bg);padding:2.5rem 2.8rem;border-radius:14px;box-shadow:0 4px 24px rgba(0,0,0,.1);width:360px;text-align:right}
.login-logo{font-size:2.2rem;text-align:center;margin-bottom:.5rem}
.login-title{font-size:1.4rem;font-weight:700;text-align:center;color:var(--primary);margin-bottom:.25rem}
.login-sub{font-size:.85rem;color:var(--muted);text-align:center;margin-bottom:1.8rem}
.field{margin-bottom:1rem}
.field label{display:block;font-size:.82rem;font-weight:600;color:var(--muted);margin-bottom:.35rem}
.field input{width:100%;padding:.6rem .85rem;border:1px solid var(--border);border-radius:var(--radius);font-size:.95rem;direction:rtl;background:var(--bg2);transition:border .2s}
.field input:focus{outline:none;border-color:var(--accent);background:var(--bg)}
.btn-login{width:100%;padding:.7rem;background:var(--primary);color:#fff;border:none;border-radius:var(--radius);font-size:1rem;font-weight:600;cursor:pointer;margin-top:.5rem;transition:background .2s}
.btn-login:hover{background:var(--primary-h)}
.login-err{color:var(--red);font-size:.83rem;margin-top:.75rem;text-align:center}
.login-ver{font-size:.75rem;color:#000;text-align:center;margin-top:1.5rem}

/* ── App layout ────────────────────────────────────── */
#app{display:flex;min-height:100vh}
#sidebar{
  position:fixed;top:0;right:0;width:var(--sidebar);height:100vh;
  background:var(--bg2);border-left:1px solid var(--border);
  padding:1.2rem .9rem;display:flex;flex-direction:column;overflow-y:auto;z-index:200
}
#main{margin-right:var(--sidebar);padding:1.5rem 2rem;flex:1;overflow-y:auto}

/* ── Sidebar components ─────────────────────────────── */
.sb-brand{padding:.5rem .3rem 1rem;border-bottom:1px solid var(--border);margin-bottom:.9rem}
.sb-eyebrow{font-size:.65rem;letter-spacing:2px;color:var(--muted);text-transform:uppercase;margin-bottom:.15rem}
.sb-title{font-size:1.2rem;font-weight:700;color:var(--primary)}
.sb-section{font-size:.7rem;letter-spacing:.5px;color:var(--muted);text-transform:uppercase;margin:.9rem 0 .4rem .3rem}
.app-btn{
  width:100%;padding:.55rem .8rem;border:1px solid var(--border);background:var(--bg);
  border-radius:var(--radius);font-size:.88rem;cursor:pointer;text-align:right;
  margin-bottom:.35rem;color:var(--text);transition:all .15s;display:flex;align-items:center;gap:.5rem
}
.app-btn:hover{background:#e8eef8;border-color:var(--accent)}
.app-btn.active{background:var(--primary);color:#fff;border-color:var(--primary)}
.sb-settings{margin-top:.5rem}
.sb-label{font-size:.78rem;color:var(--muted);margin-bottom:.25rem;display:block}
.sb-input{width:100%;padding:.45rem .6rem;border:1px solid var(--border);border-radius:6px;font-size:.82rem;direction:rtl;background:var(--bg);margin-bottom:.5rem}
.sb-input:focus{outline:none;border-color:var(--accent)}
.sb-save{width:100%;padding:.45rem;background:var(--primary);color:#fff;border:none;border-radius:6px;font-size:.82rem;cursor:pointer;margin-top:.2rem}
.sb-save:hover{background:var(--primary-h)}
.sb-bottom{margin-top:auto;padding-top:1rem;border-top:1px solid var(--border)}
.sb-user{font-size:.82rem;color:var(--muted);margin-bottom:.5rem}
.sb-user b{color:var(--text)}
.btn-logout{width:100%;padding:.4rem;background:var(--bg);border:1px solid var(--border);border-radius:6px;font-size:.82rem;cursor:pointer;color:var(--text)}
.btn-logout:hover{background:#fee2e2;border-color:var(--red);color:var(--red)}
.sb-ver{font-size:.68rem;color:#000;margin-top:.5rem;text-align:center}
details.sb-exp summary{cursor:pointer;font-size:.78rem;color:var(--muted);margin-bottom:.4rem;list-style:none}
details.sb-exp summary::-webkit-details-marker{display:none}
details.sb-exp[open] summary::before{content:"▼ "}
details.sb-exp summary::before{content:"▶ "}
.alias-row{display:flex;gap:.3rem;margin-bottom:.3rem;align-items:center}
.alias-row input{flex:1;min-width:0;padding:.35rem .5rem;border:1px solid var(--border);border-radius:5px;font-size:.78rem;direction:rtl}
.alias-del{padding:.3rem .5rem;background:#fee2e2;border:none;border-radius:5px;cursor:pointer;font-size:.75rem;color:var(--red)}

/* ── Page header ──────────────────────────────────── */
.page-eyebrow{font-size:.72rem;color:var(--muted);margin-bottom:.15rem}
.page-title{font-size:1.5rem;font-weight:700;color:var(--primary);margin-bottom:1.2rem}

/* ── Tabs ──────────────────────────────────────────── */
.tabs{display:flex;gap:0;border-bottom:2px solid var(--border);margin-bottom:1.4rem;flex-wrap:wrap}
.tab{padding:.55rem 1rem;cursor:pointer;color:var(--muted);border-bottom:2px solid transparent;margin-bottom:-2px;font-size:.88rem;white-space:nowrap;transition:color .15s}
.tab:hover{color:var(--primary)}
.tab.active{color:var(--primary);border-bottom-color:var(--primary);font-weight:600}

/* ── Buttons ───────────────────────────────────────── */
.btn{padding:.5rem 1.2rem;border:none;border-radius:var(--radius);cursor:pointer;font-size:.88rem;font-weight:500;transition:opacity .15s;display:inline-flex;align-items:center;gap:.4rem}
.btn:hover{opacity:.85}
.btn-primary{background:var(--primary);color:#fff}
.btn-outline{background:var(--bg);color:var(--text);border:1px solid var(--border)}
.btn-outline:hover{background:var(--bg2)}
.btn-sm{padding:.3rem .7rem;font-size:.8rem}
.btn-danger{background:#fee2e2;color:var(--red);border:1px solid #fca5a5}

/* ── Cards / Expanders ─────────────────────────────── */
.card{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:.75rem;box-shadow:var(--shadow);overflow:hidden}
.card-header{padding:.75rem 1rem;cursor:pointer;display:flex;align-items:center;justify-content:space-between;gap:.5rem;user-select:none}
.card-header:hover{background:var(--bg2)}
.card-title{font-size:.9rem;font-weight:600;flex:1}
.card-body{padding:.85rem 1rem;border-top:1px solid var(--border);display:none}
.card.open .card-body{display:block}
.card.open .card-chevron{transform:rotate(180deg)}
.card-chevron{transition:transform .2s;color:var(--muted);font-size:.8rem}
.card-meta{font-size:.8rem;color:var(--muted);margin-bottom:.5rem}
.card-meta span{margin-left:.9rem}
.analysis-text{font-size:.88rem;line-height:1.75;direction:rtl;text-align:right}
.analysis-text h1,.analysis-text h2,.analysis-text h3{font-size:1rem;font-weight:700;color:var(--primary);margin:1rem 0 .3rem;border-bottom:1px solid var(--border);padding-bottom:.2rem}
.analysis-text p{margin:.3rem 0}
.analysis-text ul,.analysis-text ol{margin:.3rem 0 .3rem 0;padding-right:1.4rem;padding-left:0}
.analysis-text li{margin:.15rem 0}
.analysis-text strong{font-weight:700;color:#1a1a1a}
.analysis-text table{border-collapse:collapse;width:100%;margin:.5rem 0;font-size:.85rem}
.analysis-text th{background:var(--primary);color:#fff;padding:.4rem .6rem;text-align:right;font-weight:600}
.analysis-text td{border:1px solid var(--border);padding:.35rem .6rem;text-align:right}
.analysis-text tr:nth-child(even) td{background:#f5f7fa}

/* ── Badges ────────────────────────────────────────── */
.badge{font-size:.75rem;padding:.2rem .55rem;border-radius:20px;font-weight:600;white-space:nowrap}
.badge-high{background:var(--green-bg);color:var(--green)}
.badge-medium{background:var(--yellow-bg);color:var(--yellow)}
.badge-low{background:var(--red-bg);color:var(--red)}
.badge-no_pdf,.badge-unknown{background:#f3f4f6;color:var(--muted)}

/* ── Progress ──────────────────────────────────────── */
.progress-wrap{margin:1rem 0}
.progress-bar-track{height:6px;background:var(--border);border-radius:3px;overflow:hidden;margin:.4rem 0}
.progress-bar-fill{height:100%;background:var(--accent);border-radius:3px;transition:width .3s}
.progress-log{font-size:.8rem;color:var(--muted);max-height:120px;overflow-y:auto;background:var(--bg2);border-radius:6px;padding:.5rem .7rem;margin-top:.4rem}
.progress-log p{margin:.1rem 0}
.status-counts{display:grid;grid-template-columns:repeat(4,1fr);gap:.6rem;margin:1rem 0}
.status-card{border-radius:var(--radius);padding:.75rem;text-align:center}
.status-card .count{font-size:1.6rem;font-weight:700}
.status-card .label{font-size:.75rem;color:var(--muted);margin-top:.1rem}

/* ── Filters ───────────────────────────────────────── */
.filter-bar{display:flex;gap:.4rem;margin-bottom:1rem;flex-wrap:wrap}
.filter-btn{padding:.35rem .8rem;border-radius:20px;border:1px solid var(--border);background:var(--bg);font-size:.8rem;cursor:pointer;color:var(--muted)}
.filter-btn:hover,.filter-btn.active{background:var(--primary);color:#fff;border-color:var(--primary)}

/* ── Chat ──────────────────────────────────────────── */
.chat-area{margin-top:1rem;border-top:1px solid var(--border);padding-top:.8rem}
.chat-msg{padding:.6rem .85rem;border-radius:8px;margin:.35rem 0;font-size:.85rem;line-height:1.6;direction:rtl}
.chat-msg.user{background:#e8f0fe}
.chat-msg.assistant{background:#f0f4f0}
.chat-form{display:flex;gap:.5rem;margin-top:.6rem}
.chat-form input{flex:1;padding:.5rem .75rem;border:1px solid var(--border);border-radius:6px;font-size:.85rem;direction:rtl}
.chat-form input:focus{outline:none;border-color:var(--accent)}
.chat-form button{padding:.5rem 1rem;background:var(--primary);color:#fff;border:none;border-radius:6px;cursor:pointer;font-size:.85rem}

/* ── Shift comparison ──────────────────────────────── */
.shifts-grid{display:grid;grid-template-columns:3fr 2fr;gap:1.2rem;margin-bottom:1rem}
.shifts-grid textarea{width:100%;height:280px;padding:.65rem .85rem;border:1px solid var(--border);border-radius:var(--radius);font-size:.88rem;direction:rtl;resize:vertical;font-family:inherit}
.shifts-grid textarea:focus{outline:none;border-color:var(--accent)}
.upload-area{border:2px dashed var(--border);border-radius:var(--radius);padding:2rem 1rem;text-align:center;cursor:pointer;transition:border .2s}
.upload-area:hover,.upload-area.drag{border-color:var(--accent);background:#eff6ff}
.upload-area input{display:none}
.upload-label{font-size:.85rem;color:var(--muted);display:block;margin-top:.5rem}
.result-row{padding:.5rem .9rem;border-radius:6px;margin:.3rem 0;font-size:.83rem;display:flex;gap:.75rem;align-items:baseline;direction:rtl}
.result-row .r-status{font-weight:600;white-space:nowrap;min-width:90px}
.result-row .r-worker{font-weight:600}
.result-row .r-notes{color:var(--muted);font-style:italic}

/* ── Settings form ─────────────────────────────────── */
.settings-grid{display:grid;grid-template-columns:1fr 1fr;gap:1rem;margin-bottom:1.2rem}
.settings-field label{display:block;font-size:.8rem;font-weight:600;color:var(--muted);margin-bottom:.3rem}
.settings-field input,.settings-field textarea{width:100%;padding:.5rem .7rem;border:1px solid var(--border);border-radius:6px;font-size:.88rem;direction:rtl;background:var(--bg2)}
.settings-field textarea{height:140px;resize:vertical}
.settings-field input:focus,.settings-field textarea:focus{outline:none;border-color:var(--accent);background:var(--bg)}

/* ── Recruiter Analysis ────────────────────────────── */
.rec-stats-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:.75rem;margin-bottom:1.2rem}
.rec-stat-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:.85rem 1rem;text-align:center}
.rec-stat-val{font-size:1.55rem;font-weight:700;line-height:1.1;margin-bottom:.25rem}
.rec-stat-lbl{font-size:.73rem;color:var(--muted)}
.rec-chart-grid{display:grid;grid-template-columns:1fr 1fr;gap:1rem;margin-bottom:1rem}
.rec-chart-card{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);padding:.85rem 1rem}
.rec-chart-title{font-size:.8rem;font-weight:600;color:var(--muted);margin-bottom:.5rem;text-align:right}
.rec-table{width:100%;border-collapse:collapse;font-size:.82rem}
.rec-table th{padding:.4rem .6rem;text-align:right;font-weight:600;background:var(--bg2);font-size:.78rem}
.rec-table td{padding:.35rem .6rem;border-bottom:1px solid var(--border)}
.rec-table tr:last-child td{border-bottom:none}
.app-btn.locked{opacity:.55}
.no-access-box{padding:4rem 2rem;text-align:center}
.no-access-box .na-icon{font-size:3rem;margin-bottom:.75rem}
.no-access-box .na-title{font-size:1.1rem;font-weight:600;color:var(--primary);margin-bottom:.4rem}
.no-access-box .na-sub{font-size:.85rem;color:var(--muted)}
@media(max-width:720px){.rec-stats-grid{grid-template-columns:repeat(2,1fr)}.rec-chart-grid{grid-template-columns:1fr}}

/* ── Misc ──────────────────────────────────────────── */
.info{background:#eff6ff;border:1px solid #bfdbfe;border-radius:var(--radius);padding:.75rem 1rem;font-size:.85rem;color:#1e40af;margin:.75rem 0}
.error{background:#fee2e2;border:1px solid #fca5a5;border-radius:var(--radius);padding:.75rem 1rem;font-size:.85rem;color:#991b1b;margin:.75rem 0}
.success{background:var(--green-bg);border:1px solid #86efac;border-radius:var(--radius);padding:.75rem 1rem;font-size:.85rem;color:var(--green);margin:.75rem 0}
.fav-btn{background:none;border:none;cursor:pointer;font-size:.85rem;color:var(--muted);padding:.25rem .5rem;border-radius:4px}
.fav-btn:hover{background:var(--bg2)}
.divider{border:none;border-top:1px solid var(--border);margin:1rem 0}
</style>
</head>

<script>
// ══════════════════════════════════════════
// STATE
// ══════════════════════════════════════════
const S = {
  user: null,
  activeApp: 'tender_scanner',
  activeTab: 'scan',
  settings: null,
  scanResults: [],
  scanRunning: false,
  filter: 'all',
  history: [],
  histFilter: 'all',
  favorites: [],
  lastScan: [],
  manualResult: null,
  manualChat: [],
  chats: {},
  learnTender: null,
  learnResult: null,
  learnFeedback: [],
  learnIter: 0,
  knowledge: [],
  shiftsResult: null,
  shiftsToken: null,
  shiftsCfg: null,
  aliases: [],
  recruiterData: null,
  recruiterCfg: null,
  recruiterTab: 'single',
  recruiterSelected: null,
  recruiterDateFrom: null,
  recruiterDateTo: null,
  recruiterRecruiters: [],
};

// ══════════════════════════════════════════
// API
// ══════════════════════════════════════════
async function api(method, path, body, isForm) {
  const opts = { method, credentials: 'same-origin' };
  if (body) {
    if (isForm) { opts.body = body; }
    else { opts.headers = {'Content-Type':'application/json'}; opts.body = JSON.stringify(body); }
  }
  const r = await fetch(path, opts);
  if (r.status === 401) { showLogin(); return null; }
  if (!r.ok) {
    const e = await r.json().catch(() => ({detail: r.statusText}));
    throw new Error(e.detail || r.statusText);
  }
  return r.json();
}
const GET  = p => api('GET', p);
const POST = (p,b) => api('POST', p, b);
const DEL  = p => api('DELETE', p);

// ══════════════════════════════════════════
// UTIL
// ══════════════════════════════════════════
function relevance(analysis) {
  if (analysis === 'NO_PDF') return 'no_pdf';
  if (!analysis || analysis.startsWith('שגיאה')) return 'unknown';
  const m1 = analysis.match(/רלוונטיות[^\n]*?:\s*\**([גבוהבינוניתנמוכה]+)/);
  if (m1) {
    const w = m1[1];
    if (w.includes('גבוהה')) return 'high';
    if (w.includes('בינונית')) return 'medium';
    if (w.includes('נמוכה')) return 'low';
  }
  if (analysis.includes('גבוהה')) return 'high';
  if (analysis.includes('בינונית')) return 'medium';
  if (analysis.includes('נמוכה')) return 'low';
  return 'unknown';
}
function badgeHtml(r) {
  const map = {high:'🟢 גבוהה',medium:'🟡 בינונית',low:'🔴 נמוכה',no_pdf:'⬛ ללא PDF',unknown:'⚪ לא ידוע'};
  return `<span class="badge badge-${r}">${map[r]||r}</span>`;
}
function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
function md(raw) {
  const lines = String(raw||'').split('\n');
  let html = '', inList = false, inTable = false;
  const closeList = () => { if (inList) { html += '</ul>'; inList = false; } };
  const closeTable = () => { if (inTable) { html += '</tbody></table>'; inTable = false; } };
  for (let i = 0; i < lines.length; i++) {
    let l = lines[i];
    // Table row
    if (l.trim().startsWith('|') && l.trim().endsWith('|')) {
      closeList();
      const cells = l.trim().slice(1,-1).split('|').map(c=>c.trim());
      if (cells.every(c => /^[-:]+$/.test(c))) continue; // separator row
      if (!inTable) { html += '<table><tbody>'; inTable = true; }
      const isHeader = i===0 || !lines[i-1]?.trim().startsWith('|');
      const tag = isHeader ? 'th' : 'td';
      html += '<tr>' + cells.map(c=>`<${tag}>${inline(c)}</${tag}>`).join('') + '</tr>';
      continue;
    }
    closeTable();
    // Heading
    const hm = l.match(/^(#{1,3})\s+(.*)/);
    if (hm) { closeList(); html += `<h${hm[1].length}>${inline(hm[2])}</h${hm[1].length}>`; continue; }
    // Bullet
    const bm = l.match(/^[-*+]\s+(.*)/);
    if (bm) { if (!inList) { html += '<ul>'; inList = true; } html += `<li>${inline(bm[1])}</li>`; continue; }
    // Numbered list
    const nm = l.match(/^\d+\.\s+(.*)/);
    if (nm) { if (!inList) { html += '<ul>'; inList = true; } html += `<li>${inline(nm[1])}</li>`; continue; }
    // Empty line
    if (!l.trim()) { closeList(); html += '<br>'; continue; }
    // Normal paragraph
    closeList();
    html += `<p>${inline(l)}</p>`;
  }
  closeList(); closeTable();
  return html;
  function inline(s) {
    return esc(s)
      .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
      .replace(/\*(.+?)\*/g, '<em>$1</em>')
      .replace(/`(.+?)`/g, '<code>$1</code>');
  }
}
function toast(msg, type='success') {
  const d = document.createElement('div');
  d.className = type === 'error' ? 'error' : 'success';
  d.style.cssText = 'position:fixed;bottom:1.5rem;left:50%;transform:translateX(-50%);z-index:9999;min-width:200px;text-align:center;max-width:400px';
  d.textContent = msg;
  document.body.appendChild(d);
  setTimeout(() => d.remove(), 3000);
}

document.getElementById('login-form').addEventListener('submit', async e => {
  e.preventDefault();
  const err = document.getElementById('login-err');
  err.classList.add('hidden');
  const fd = new FormData();
  fd.append('username', document.getElementById('l-user').value.trim());
  fd.append('password', document.getElementById('l-pass').value);
  try {
    const r = await fetch('/api/login', {method:'POST', credentials:'same-origin', body:fd});
    if (!r.ok) {
      err.textContent = '❌ שם משתמש או סיסמה שגויים';
      err.classList.remove('hidden');
      return;
    }
    const user = await r.json();
    S.user = user;
    const saved = localStorage.getItem('activeApp');
    S.activeApp = (saved && user.apps.includes(saved)) ? saved : (user.apps[0] || 'tender_scanner');
    await initApp();
    showApp();
  } catch(ex) {
    err.textContent = '❌ שם משתמש או סיסמה שגויים';
    err.classList.remove('hidden');
  }
});

  await POST('/api/logout');

async function initApp() {
  document.getElementById('sb-name').textContent = S.user.name;
  S.settings = await GET('/api/settings');
  S.knowledge = await GET('/api/knowledge');
  S.lastScan = await GET('/api/last-scan') || [];
  S.scanResults = [...S.lastScan];
  S.history = await GET('/api/history') || [];
  S.favorites = await GET('/api/favorites') || [];
  S.shiftsCfg = await GET('/api/shifts/config');
  S.aliases = Object.entries(S.shiftsCfg.aliases || {});
  S.managers = S.shiftsCfg.managers || [];
  S.recruiterCfg = await GET('/api/recruiter/config');
  S.recruiterRecruiters = (S.recruiterCfg.recruiters || []).map(r => ({...r}));
  if ((S.user.apps || []).includes('recruiter_analysis')) {
    const savedFrom = localStorage.getItem('recruiterDateFrom');
    const savedTo   = localStorage.getItem('recruiterDateTo');
    const params = new URLSearchParams();
    if (savedFrom && savedTo) {
      params.set('date_from', savedFrom);
      params.set('date_to',   savedTo);
    } else {
      const today = new Date();
      const week  = new Date(today); week.setDate(today.getDate() - 6);
      params.set('date_from', week.toISOString().slice(0,10));
      params.set('date_to',   today.toISOString().slice(0,10));
    }
    S.recruiterDateFrom = params.get('date_from');
    S.recruiterDateTo   = params.get('date_to');
    S.recruiterData = await GET(`/api/recruiter/data?${params}`).catch(() => null);
    if (S.recruiterData?.recruiters?.length) S.recruiterSelected = S.recruiterData.recruiters[0].extension;
  }
  renderSidebar();
  renderMain();
}

  const days = S.settings.scraper.days_back;

  el.innerHTML = `
    <div style="color:var(--muted);font-size:.83rem;margin-bottom:1rem">

      <button class="btn btn-primary" id="scan-btn" onclick="startScan()" ${S.scanRunning?'disabled':''}>
        ${S.scanRunning ? '⏳ סורק...' : '▶ הפעל סריקה'}
      </button>
      <label style="display:flex;align-items:center;gap:.4rem;font-size:.85rem;cursor:pointer">
        <input type="checkbox" id="skip-seen" ${!S.scanRunning?'':'disabled'} ${S.skipSeen!==false?'checked':''} onchange="S.skipSeen=this.checked"> דלג על שנסרקו
      </label>

    ${S.scanDone && !S.scanResults.length ? `<div style="text-align:center;padding:2rem;color:var(--muted);font-size:.95rem">אין מכרזים חדשים — כל המכרזים באתר כבר נותחו.<br><span style="font-size:.82rem">בטל את "דלג על שנסרקו" כדי לנתח מחדש.</span></div>` : ''}`;
  if (S.scanResults.length) renderResultList('scan-results', S.scanResults, S.filter);
}

function startScan() {
  if (S.scanRunning) return;
  S.scanRunning = true;
  S.scanResults = [];
  S.filter = 'all';
  renderTenderApp();

  const skipSeen = document.getElementById('skip-seen').checked;
  const prog = document.getElementById('scan-progress');
  prog.classList.remove('hidden');
  prog.innerHTML = `
    <div class="progress-wrap">
      <div style="font-size:.85rem;font-weight:600;margin-bottom:.3rem" id="prog-status">מתחיל סריקה...</div>
      <div class="progress-bar-track"><div class="progress-bar-fill" id="prog-bar" style="width:0%"></div></div>
      <div class="progress-log" id="prog-log"></div>
    </div>`;

  const evtSrc = new EventSource(`/api/scan?skip_seen=${skipSeen}`);

  evtSrc.onmessage = e => {
    const d = JSON.parse(e.data);
    const statusEl = document.getElementById('prog-status');
    const barEl = document.getElementById('prog-bar');
    const logEl = document.getElementById('prog-log');

    if (d.type === 'status') {
      if (statusEl) statusEl.textContent = d.msg;
    } else if (d.type === 'count') {
      if (statusEl) statusEl.textContent = `נמצאו ${d.total} מכרזים | ${d.new} חדשים לניתוח`;
    } else if (d.type === 'progress') {
      if (statusEl) statusEl.textContent = `[${d.i}/${d.total}] ${d.title}`;
      if (barEl) barEl.style.width = (d.i / d.total * 100) + '%';
      if (logEl) { const p = document.createElement('p'); p.textContent = `🔎 ${d.title}`; logEl.prepend(p); }
    } else if (d.type === 'result') {
      S.scanResults.push(d.data);
      if (barEl) barEl.style.width = (d.pct * 100) + '%';
      renderResultList('scan-results', S.scanResults, S.filter);
    } else if (d.type === 'complete') {
      evtSrc.close();
      S.scanRunning = false;
      S.scanDone = true;
      if (barEl) barEl.style.width = '100%';
      if (d.count === 0 && d.total === 0) {
        toast('הסריקה הושלמה — לא נמצאו מכרזים חדשים באתר', 'success');
      } else if (d.count === 0) {
        toast(`נמצאו ${d.total} מכרזים — כולם כבר נותחו בעבר. בטל "דלג על מכרזים שנותחו" כדי לנתח מחדש.`, 'success');
      } else {
        toast(`✅ הסריקה הושלמה — ${d.count} מכרזים חדשים נותחו`, 'success');
      }
      renderTenderApp();
      renderScanFilterBar();
    } else if (d.type === 'error') {
      evtSrc.close();
      S.scanRunning = false;
      toast(`שגיאת סריקה: ${d.msg}`, 'error');
      if (prog) { prog.classList.remove('hidden'); prog.innerHTML = `<div class="error" style="white-space:pre-wrap;font-size:.8rem">${esc(d.msg)}</div>`; }
      renderTenderApp();
    }
  };

  evtSrc.onerror = (e) => {
    if (!S.scanRunning) return;
    evtSrc.close();
    S.scanRunning = false;
    toast('שגיאה: החיבור לשרת נותק — בדוק לוגים', 'error');
    renderTenderApp();
  };
}

function renderResultList(containerId, results, filter) {
  const el = document.getElementById(containerId);
  if (!el) return;
  const order = {high:0, medium:1, low:2, unknown:3, no_pdf:4};
  const sorted = [...results].sort((a,b) => (order[relevance(a.analysis)]||3) - (order[relevance(b.analysis)]||3));
  const counts = {};
  results.forEach(r => { const k = relevance(r.analysis); counts[k] = (counts[k]||0)+1; });

  const filtered = filter === 'all' ? sorted : sorted.filter(r => relevance(r.analysis) === filter);

  el.innerHTML = `
    <div class="filter-bar">
      <button class="filter-btn${filter==='all'?' active':''}" onclick="setFilter('all','${containerId}',window._curResults)">הכל (${results.length})</button>
      <button class="filter-btn${filter==='high'?' active':''}" onclick="setFilter('high','${containerId}',window._curResults)">🟢 גבוהה (${counts.high||0})</button>
      <button class="filter-btn${filter==='medium'?' active':''}" onclick="setFilter('medium','${containerId}',window._curResults)">🟡 בינונית (${counts.medium||0})</button>
      <button class="filter-btn${filter==='low'?' active':''}" onclick="setFilter('low','${containerId}',window._curResults)">🔴 נמוכה (${counts.low||0})</button>
    </div>
    <div style="font-size:.82rem;color:var(--muted);margin-bottom:.7rem">מציג ${filtered.length} מכרזים</div>
    ${filtered.map(r => tenderCard(r, filter)).join('')}`;

  window._curResults = results;
}

function setFilter(f, cid, results) {
  if (cid === 'scan-results') S.filter = f;
  else if (cid === 'hist-results') S.histFilter = f;
  renderResultList(cid, results, f);
}

async function sendChat(tid, key) {
  const inp = document.getElementById(`cinput_${key}`);
  const msg = inp?.value.trim();
  if (!msg) return;
  inp.value = '';

  const tender = [...S.scanResults, ...S.history, S.manualResult].find(r => r && r.tender_id === tid);
  if (!S.chats[key]) S.chats[key] = [];
  S.chats[key].push({role:'user', content: msg});
  renderChatMessages(key);

  try {
    const res = await POST('/api/chat', { tender, history: S.chats[key] });
    if (res) {
      S.chats[key].push({role:'assistant', content: res.reply});
      renderChatMessages(key);
    }
  } catch(e) {
    S.chats[key].push({role:'assistant', content:`שגיאה: ${e.message}`});
    renderChatMessages(key);
  }
}

function renderChatMessages(key) {
  const el = document.getElementById(`chat_${key}`);
  if (!el) return;
  el.innerHTML = (S.chats[key]||[]).map(m =>
    `<div class="chat-msg ${m.role}">${m.role==='user'?'🧑':'🤖'} ${esc(m.content)}</div>`
  ).join('');
  el.scrollTop = el.scrollHeight;
}

function renderQuestionsTable(raw) {
  const rows = [];
  for (const line of raw.trim().split('\n')) {
    const t = line.trim(); if (!t) continue;
    const parts = t.split('|');
    if (parts.length >= 4) {
      rows.push([parts[0].trim(), parts[1].trim(), parts[2].trim(), parts.slice(3).join('|').trim()]);
    } else {
      rows.push([String(rows.length+1), 'כללי', 'כללי', t.replace(/^\d+\.\s*/,'')]);
    }
  }
  if (!rows.length) return `<pre style="font-size:.83rem">${esc(raw)}</pre>`;
  return `<table class="rec-table" style="width:100%;font-size:.82rem">
    <thead><tr>
      <th style="width:3rem;text-align:center">מספר</th>
      <th style="width:5rem;text-align:center">עמוד</th>
      <th style="width:6rem;text-align:center">סעיף</th>
      <th>שאלה</th>
    </tr></thead>
    <tbody>${rows.map(([n,pg,sec,q],i)=>`
      <tr style="background:${i%2===0?'var(--bg2)':'var(--bg)'}">
        <td style="text-align:center">${esc(n)}</td>
        <td style="text-align:center">${esc(pg)}</td>
        <td style="text-align:center">${esc(sec)}</td>
        <td>${esc(q)}</td>
      </tr>`).join('')}
    </tbody></table>`;
}

// ══════════════════════════════════════════
// RECRUITER ANALYSIS
// ══════════════════════════════════════════

function svgBars(items, opts={}) {
  const {color='#2563eb', unit='', h=170} = opts;
  if (!items.length) return '<div style="color:var(--muted);font-size:.82rem;padding:.5rem 0">אין נתונים</div>';
  const W=600, H=h, pT=10, pR=8, pB=items.length>12?46:34, pL=8;
  const cW=W-pL-pR, cH=H-pT-pB;
  const maxV=Math.max(...items.map(d=>d.v), 0.001);
  const slot=cW/items.length, bW=Math.max(slot*0.65,2);
  let svg=`<svg viewBox="0 0 ${W} ${H}" style="width:100%;height:auto;display:block;overflow:visible">`;
  svg+=`<line x1="${pL}" y1="${pT}" x2="${pL}" y2="${pT+cH}" stroke="#e4e7ec" stroke-width="1"/>`;
  svg+=`<line x1="${pL}" y1="${pT+cH}" x2="${W-pR}" y2="${pT+cH}" stroke="#e4e7ec" stroke-width="1"/>`;
  items.forEach((d,i)=>{
    const x=pL+i*slot+slot*0.175;
    const barH=Math.max((d.v/maxV)*cH,0);
    const y=pT+cH-barH;
    const c=d.color||color;
    svg+=`<rect x="${x.toFixed(1)}" y="${y.toFixed(1)}" width="${bW.toFixed(1)}" height="${barH.toFixed(1)}" fill="${c}" rx="3" opacity=".88"/>`;
    if(d.v>0){
      const vLabel=Number.isInteger(d.v)?d.v:d.v.toFixed(1);
      svg+=`<text x="${(x+bW/2).toFixed(1)}" y="${(y-4).toFixed(1)}" text-anchor="middle" font-size="9" fill="#374151">${vLabel}${unit}</text>`;
    }
    const lbl=String(d.l);
    if(items.length>12){
      const lx=(x+bW/2).toFixed(1), ly=(pT+cH+12).toFixed(1);
      svg+=`<text x="${lx}" y="${ly}" text-anchor="end" font-size="8.5" fill="#6b7280" transform="rotate(-45,${lx},${ly})">${esc(lbl)}</text>`;
    } else {
      svg+=`<text x="${(x+bW/2).toFixed(1)}" y="${(pT+cH+14).toFixed(1)}" text-anchor="middle" font-size="9.5" fill="#6b7280">${esc(lbl)}</text>`;
    }
  });
  svg+='</svg>';
  return svg;
}

async function uploadRecruiterFile(file){
  if(!file) return;
  const fd=new FormData();
  fd.append('excel', file);
  try{
    const res=await api('POST','/api/recruiter/upload',fd,true);
    if(!res) return;
    toast(`✅ הועלו ${res.total_calls} שיחות!`);
    const today = new Date();
    const week  = new Date(today); week.setDate(today.getDate() - 6);
    S.recruiterDateFrom = week.toISOString().slice(0,10);
    S.recruiterDateTo   = today.toISOString().slice(0,10);
    localStorage.setItem('recruiterDateFrom', S.recruiterDateFrom);
    localStorage.setItem('recruiterDateTo',   S.recruiterDateTo);
    await loadRecruiterData();
  }catch(e){ toast(`שגיאה: ${e.message}`,'error'); }
}

async function loadRecruiterData(){
  try{
    const params = new URLSearchParams();
    if(S.recruiterDateFrom) params.set('date_from', S.recruiterDateFrom);
    if(S.recruiterDateTo)   params.set('date_to',   S.recruiterDateTo);
    S.recruiterData=await GET(`/api/recruiter/data?${params}`);
    if(S.recruiterData?.full_range && !S.recruiterDateFrom){
      S.recruiterDateFrom=S.recruiterData.full_range.from;
      S.recruiterDateTo=S.recruiterData.full_range.to;
    }
    if(S.recruiterData?.recruiters?.length && !S.recruiterSelected)
      S.recruiterSelected=S.recruiterData.recruiters[0].extension;
    renderRecruiterApp();
  }catch(e){ toast(`שגיאה בטעינת נתונים: ${e.message}`,'error'); }
}

function applyRecruiterDates(){
  const f=document.getElementById('rec-date-from')?.value;
  const t=document.getElementById('rec-date-to')?.value;
  if(f){ S.recruiterDateFrom=f; localStorage.setItem('recruiterDateFrom',f); }
  if(t){ S.recruiterDateTo=t;   localStorage.setItem('recruiterDateTo',t); }
  loadRecruiterData();
}

function handleFile(file) {

}

function handleDrop(e) {
  e.preventDefault();
  document.getElementById('upload-area').classList.remove('drag');
  const file = e.dataTransfer.files[0];

}

function findSuspiciousLines(text) {
  const suspicious = [];
  for (const rawLine of text.split('\n')) {
    const line = rawLine.trim();
    if (!line) continue;
    const commas = (line.match(/,/g) || []).length;
    if (commas >= 2) continue;  // valid worker line format
    // Skip pure date headers: optional Hebrew word + date pattern, no hours marker after
    if (/^[א-ת\s]*\d{1,2}[./]\d{1,2}\s*$/.test(line)) continue;
    const hasHebrew = /[א-ת]/.test(line);
    const hasHours  = /\d[ש]|[ש]\d/.test(line);  // ש = ש
    if (hasHebrew && (commas >= 1 || hasHours)) {
      suspicious.push(line);
    }
  }
  return suspicious;
}

async function runCompare() {
  const msg = document.getElementById('sh-msg').value.trim();
  if (!msg) { toast('נא להדביק הודעת וואטסאפ', 'error'); return; }
  if (!_shiftsFile) { toast('נא להעלות קובץ אקסל', 'error'); return; }

  const suspicious = findSuspiciousLines(msg);
  if (suspicious.length > 0) {
    const el = document.getElementById('shifts-result');
    el.innerHTML = `
      <div style="background:#fef9c3;border:2px solid #fbbf24;border-radius:var(--radius);padding:1rem 1.2rem;margin-bottom:1rem">
        <div style="font-size:.95rem;font-weight:700;color:#92400e;margin-bottom:.5rem">⚠️ שורות חשודות — ייתכן שחסרה פסיק</div>
        <div style="font-size:.82rem;color:#78350f;margin-bottom:.75rem">השורות הבאות לא הוכרו כשורות עובד תקינות (פורמט: שם, מקום, שעות). ייתכן שחסר פסיק:</div>
        <div style="background:#fff;border-radius:6px;padding:.6rem .85rem;margin-bottom:.85rem;font-family:monospace;direction:rtl">
          ${suspicious.map(l => `<div style="padding:.2rem 0;border-bottom:1px solid #fef3c7;font-size:.85rem">${esc(l)}</div>`).join('')}
        </div>
        <div style="display:flex;gap:.75rem">
          <button class="btn btn-primary" onclick="doCompare()">המשך בכל זאת</button>
          <button class="btn btn-outline" onclick="document.getElementById('shifts-result').innerHTML=''">חזור לתיקון</button>
        </div>
      </div>`;
    return;
  }

  await doCompare();
}

async function doCompare() {
  const msg = document.getElementById('sh-msg').value.trim();
  const el = document.getElementById('shifts-result');
  el.innerHTML = `<div class="info">⏳ משווה נתונים...</div>`;

  const fd = new FormData();
  fd.append('message', msg);
  fd.append('excel', _shiftsFile);

  try {
    const res = await api('POST', '/api/shifts/compare', fd, true);
    if (!res) return;
    S.shiftsResult = res.results;
    S.shiftsToken = res.token;
    renderShiftsResult();
  } catch(e) {
    el.innerHTML = `<div class="error">שגיאה: ${esc(e.message)}</div>`;
  }
}

function renderShiftsResult() {
  const el = document.getElementById('shifts-result');
  if (!el || !S.shiftsResult) return;
  const r = S.shiftsResult;
  const counts = {};
  r.forEach(row => { counts[row.status] = (counts[row.status]||0)+1; });

  const STATUS_BG = {ok:'var(--green-bg)', gap:'var(--yellow-bg)', missing_msg:'var(--orange-bg)', missing_excel:'var(--red-bg)'};
  const STATUS_LABEL = {ok:'✅ תקין', gap:'⚠️ פער', missing_msg:'🟠 חסר בהודעה', missing_excel:'🔴 חסר באקסל'};

  el.innerHTML = `
    <div class="status-counts">
      <div class="status-card" style="background:var(--green-bg)"><div class="count" style="color:var(--green)">${counts.ok||0}</div><div class="label">תקין</div></div>
      <div class="status-card" style="background:var(--yellow-bg)"><div class="count" style="color:var(--yellow)">${counts.gap||0}</div><div class="label">פער</div></div>
      <div class="status-card" style="background:var(--orange-bg)"><div class="count" style="color:var(--orange)">${counts.missing_msg||0}</div><div class="label">חסר בהודעה</div></div>
      <div class="status-card" style="background:var(--red-bg)"><div class="count" style="color:var(--red)">${counts.missing_excel||0}</div><div class="label">חסר באקסל</div></div>
    </div>
    <div style="margin-bottom:1rem">
      <a href="/api/shifts/download/${S.shiftsToken}" class="btn btn-primary">⬇️ הורד Excel</a>
    </div>
    <hr class="divider">
    ${r.map(row => {
      const bg = STATUS_BG[row.status] || '#fff';
      const label = STATUS_LABEL[row.status] || row.status;
      const time = row.start_time ? `${row.start_time}–${row.end_time}` : '';
      return `<div class="result-row" style="background:${bg}">
        <span class="r-status">${label}</span>
        <span class="r-worker">${esc(row.worker_name)}</span>
        ${row.workplace?`<span style="color:var(--muted)">${esc(row.workplace)}</span>`:''}
        ${row.date?`<span style="color:var(--muted)">${esc(row.date)}</span>`:''}
        ${time?`<span style="color:var(--muted)">${esc(time)}</span>`:''}
        ${row.notes?`<span class="r-notes">${esc(row.notes)}</span>`:''}
      </div>`;
    }).join('')}`;
}

// ══════════════════════════════════════════
// BOOT
// ══════════════════════════════════════════
(async () => {
  try {
    const user = await GET('/api/me');
    if (user) {
      S.user = user;
      const saved2 = localStorage.getItem('activeApp');
      S.activeApp = (saved2 && user.apps.includes(saved2)) ? saved2 : (user.apps[0] || 'tender_scanner');
      await initApp();
      showApp();
    } else {
      showLogin();
    }
  } catch {
    showLogin();
  }
})();
</script>
</body>
</html>
